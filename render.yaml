services:
  - type: web
    name: brekkie-ai
    runtime: docker
    dockerfilePath: ./Dockerfile
    port: 8080
    healthCheckPath: /api/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DB_URL
        sync: false
      - key: CHECKPOINT_DB_URL
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
